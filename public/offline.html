<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — ToolKit Dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #0A0A0D; color: #F0EFEC;
    }
    .offline-content { text-align: center; padding: 2rem; }
    .offline-icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #FFB800; margin-bottom: 0.5rem; }
    p { color: #B0B0C0; }
    button {
      background: #FFB800; color: #000; border: none;
      padding: 0.75rem 1.5rem; border-radius: 8px;
      cursor: pointer; font-size: 1rem; font-weight: 600;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="offline-content">
    <div class="offline-icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No tenés internet. Algunas funciones no están disponibles.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
